<!DOCTYPE html>
<html>
<head>
    <title>For Radha Rani ❤️</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: Arial;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            color: white;
            overflow: hidden;
        }

        h1 {
            margin-top: 80px;
            font-size: 45px;
        }

        h2 {
            font-size: 22px;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            background: #ff4d6d;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }

        #message {
            display: none;
            font-size: 24px;
            margin-top: 30px;
            padding: 20px;
        }

        /* ❤️ Floating hearts */
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }

        .heart {
            position: fixed;
            bottom: 0;
            animation: floatUp 5s linear infinite;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>

<h1>Radha Rani ❤️</h1>
<h2>There is something in my heart for you...</h2>

<button onclick="startLove()" id="startBtn">Open My Heart 💌</button>

<div id="message">
    <p>You are my happiness 💖</p>
    <p>I love you so much, Radha Rani ❤️</p>
    <p>– Yours, Kanhaiya 💕</p>
    <p><b>Will you be mine forever? 💍</b></p>

    <button onclick="yes()">Yes 😍</button>
    <button id="noBtn" onmouseover="moveNo()">No 😢</button>
</div>

<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<canvas id="fireworks"></canvas>

<script>
// Start everything
function startLove() {
    document.getElementById("message").style.display = "block";
    document.getElementById("startBtn").style.display = "none";

    let music = document.getElementById("music");
    music.play().catch(() => {});

    createHearts();
}

// ❤️ Hearts
function createHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 15) + "px";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 300);
}

// 😂 No button moves
function moveNo() {
    let btn = document.getElementById("noBtn");
    btn.style.position = "absolute";
    btn.style.left = Math.random() * window.innerWidth + "px";
    btn.style.top = Math.random() * window.innerHeight + "px";
}

// 🎆 Fireworks
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function yes() {
    alert("You made me the happiest ❤️ – Kanhaiya");
    startFireworks();
}

function startFireworks() {
    setInterval(() => {
        for (let i = 0; i < 100; i++) {
            particles.push({
                x: canvas.width / 2,
                y: canvas.height / 2,
                dx: (Math.random() - 0.5) * 6,
                dy: (Math.random() - 0.5) * 6,
                life: 100
            });
        }
    }, 800);
}

function animateFireworks() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, i) => {
        p.x += p.dx;
        p.y += p.dy;
        p.life--;

        ctx.fillStyle = "yellow";
        ctx.fillRect(p.x, p.y, 3, 3);

        if (p.life <= 0) particles.splice(i, 1);
    });

    requestAnimationFrame(animateFireworks);
}

animateFireworks();
</script>

</body>
</html>
